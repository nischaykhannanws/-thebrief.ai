name: Send Newsletter Issue

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: "Issue date in DD-MM-YYYY format (e.g. 27-03-2026)"
        required: true
        type: string
      issue_number:
        description: "Issue number (e.g. 008)"
        required: true
        type: string
      subject_line:
        description: "Email subject line"
        required: true
        type: string

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Fetch issue HTML from live site
        id: fetch_html
        run: |
          ISSUE_URL="https://nischaykhannanws.github.io/-thebrief.ai/issues/${{ github.event.inputs.issue_date }}.html"
          echo "Fetching: $ISSUE_URL"
          curl -s "$ISSUE_URL" -o issue.html
          echo "Fetched $(wc -c < issue.html) bytes"

      - name: Send emails to all subscribers
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ISSUE_DATE: ${{ github.event.inputs.issue_date }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          SUBJECT_LINE: ${{ github.event.inputs.subject_line }}
        run: node scripts/send-email.js
